name: Atrix Substatus Sync

on:
  workflow_dispatch: # Botao Iniciar no painel / botao manual no GitHub

permissions:
  contents: write

concurrency:
  group: atrix-sync
  cancel-in-progress: false

jobs:
  sync:
    # ubuntu-latest nao alcanca atrix.mobtelecom.com.br. Qualquer dispositivo
    # Windows com runner self-hosted "jarvis" e acesso ao Atrix pode atender.
    runs-on: [self-hosted, jarvis]
    timeout-minutes: 30
    defaults:
      run:
        # Forca bypass porque alguns Windows bloqueiam os scripts temporarios do Actions.
        shell: powershell -ExecutionPolicy Bypass -Command "& '{0}'"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('scraper/package-lock.json') }}

      - name: Install dependencies
        working-directory: scraper
        run: npm ci

      - name: Install Chromium
        working-directory: scraper
        run: npx playwright install chromium

      - name: Verificar secrets Atrix
        env:
          ATRIX_USER: ${{ secrets.ATRIX_USER }}
          ATRIX_PASS: ${{ secrets.ATRIX_PASS }}
        run: |
          if (-not $env:ATRIX_USER -or -not $env:ATRIX_PASS) {
            Write-Output "ERRO: ATRIX_USER ou ATRIX_PASS nao encontrados nos secrets do repositorio."
            Write-Output ""
            Write-Output "Acesse: github.com/${{ github.repository }}/settings/secrets/actions"
            Write-Output "Crie os secrets com os nomes EXATOS:"
            Write-Output "  - ATRIX_USER  (seu usuario do Atrix)"
            Write-Output "  - ATRIX_PASS  (sua senha do Atrix)"
            exit 1
          }
          Write-Output "OK: ATRIX_USER configurado ($($env:ATRIX_USER.Length) caracteres)"
          Write-Output "OK: ATRIX_PASS configurado ($($env:ATRIX_PASS.Length) caracteres)"

      - name: Run Atrix sync
        working-directory: scraper
        env:
          ATRIX_BASE_URL: https://atrix.mobtelecom.com.br/controle/
          ATRIX_USER: ${{ secrets.ATRIX_USER }}
          ATRIX_PASS: ${{ secrets.ATRIX_PASS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: main
          DELAY_SECONDS: 1
          SINGLE_CYCLE: 1
          DEBUG: 0
        run: node atrix_agent.js

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: atrix-log
          path: scraper/atrix_agent.log
          retention-days: 3
