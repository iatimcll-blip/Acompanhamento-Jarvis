name: Atrix Substatus Sync

on:
  schedule:
    # a cada 90 minutos (cron nao aceita */90 em minutos, entao alterna dois horarios)
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
    - cron: '30 1,4,7,10,13,16,19,22 * * *'
  workflow_dispatch:           # botão manual no GitHub

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('scraper/package-lock.json') }}

      - name: Install dependencies
        working-directory: scraper
        run: npm ci

      - name: Install Chromium (com dependencias de SO)
        working-directory: scraper
        run: npx playwright install --with-deps chromium

      - name: Verificar secrets Atrix
        env:
          ATRIX_USER: ${{ secrets.ATRIX_USER }}
          ATRIX_PASS: ${{ secrets.ATRIX_PASS }}
        run: |
          if [ -z "$ATRIX_USER" ] || [ -z "$ATRIX_PASS" ]; then
            echo "❌ ATRIX_USER ou ATRIX_PASS não encontrados nos secrets do repositório."
            echo ""
            echo "Acesse: github.com/${{ github.repository }}/settings/secrets/actions"
            echo "Crie os secrets com os nomes EXATOS:"
            echo "  - ATRIX_USER  (seu usuário do Atrix)"
            echo "  - ATRIX_PASS  (sua senha do Atrix)"
            exit 1
          fi
          echo "✓ ATRIX_USER configurado (${#ATRIX_USER} caracteres)"
          echo "✓ ATRIX_PASS configurado (${#ATRIX_PASS} caracteres)"

      - name: Run Atrix sync
        working-directory: scraper
        env:
          ATRIX_BASE_URL: https://atrix.mobtelecom.com.br/controle/
          ATRIX_USER: ${{ secrets.ATRIX_USER }}
          ATRIX_PASS: ${{ secrets.ATRIX_PASS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: main
          DELAY_SECONDS: 1
          SINGLE_CYCLE: 1
          DEBUG: 0
        run: node atrix_agent.js

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: atrix-log
          path: scraper/atrix_agent.log
          retention-days: 3
