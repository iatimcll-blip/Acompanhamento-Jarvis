<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 280px; background: #0f172a; color: #e2e8f0; padding: 16px; }

  .header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .dot.running { background: #f59e0b; animation: pulse 1s infinite; }
  .dot.error   { background: #ef4444; }
  h2 { font-size: 14px; font-weight: 700; color: #60a5fa; }

  .row { margin-bottom: 12px; }
  .label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: #64748b; margin-bottom: 3px; }
  .value { font-size: 12px; color: #e2e8f0; line-height: 1.4; }

  .divider { border: none; border-top: 1px solid #1e293b; margin: 12px 0; }

  button {
    width: 100%; padding: 9px 12px; border: none; border-radius: 7px;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: background .15s;
  }
  #btnSync { background: #2563eb; color: #fff; }
  #btnSync:hover:not(:disabled) { background: #1d4ed8; }
  #btnSync:disabled { background: #1e293b; color: #475569; cursor: default; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>
<body>
  <div class="header">
    <div class="dot" id="dot"></div>
    <h2>Jarvis Atrix Sync</h2>
  </div>

  <div class="row">
    <div class="label">Última sincronização</div>
    <div class="value" id="lastSync">—</div>
  </div>
  <div class="row">
    <div class="label">Resultado</div>
    <div class="value" id="lastResult">—</div>
  </div>

  <hr class="divider">

  <button id="btnSync">⟳ Sincronizar Agora</button>

  <script src="popup.js"></script>
</body>
</html>
