version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: jarvis-db-prod
    environment:
      POSTGRES_USER: ${DB_USER:-jarvis}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-jarvis_db}
      TZ: America/Fortaleza
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jarvis}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jarvis-network
    restart: unless-stopped

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jarvis-backend-prod
    environment:
      DATABASE_URL: postgresql://${DB_USER:-jarvis}:${DB_PASSWORD}@db:5432/${DB_NAME:-jarvis_db}
      DEBUG: "False"
      LOG_LEVEL: INFO
      ENVIRONMENT: production
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    networks:
      - jarvis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: jarvis-frontend-prod
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      REACT_APP_API_URL: ${API_URL:-http://api.jarvis.local}
    depends_on:
      - backend
    networks:
      - jarvis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (opcional)
  nginx:
    image: nginx:alpine
    container_name: jarvis-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - jarvis-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  jarvis-network:
    driver: bridge
